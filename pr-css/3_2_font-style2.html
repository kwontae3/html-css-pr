<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      html {
        font-size: 16px;
      }
      .content {
        border: 1px solid blue;
      }
      .text-center {
        text-align: center;
      }
      .text-right {
        text-align: right;
      }
      .text-left {
        text-align: left;
      }
      .article {
        line-height: 1.8rem;
        letter-spacing: 2px;
        word-spacing: 10px;
        text-indent: 80px;
      }
      .transform-case {
        text-transform: lowercase;
      }
      .article > a {
        text-decoration: line-through;
      }
      .text-shadow {
        text-shadow: 5px 5px 3px blue;
      }
      ul {
        list-style: none;
      }
    </style>
  </head>
  <body>
    <section>
      <p class="content text-center">권태</p>
      <p class="content text-right">권태</p>
      <p class="content text-left">권태</p>
    </section>
    <section>
      <p class="article">
        잠이 오지 않는 밤(<span class="transform-case">Night</span>) 습관처럼
        너를 그린다 <a href="#">작은</a> 소리에도 혹시나 네가 흩어질까 겁이 나
        '보고 싶었어, 보고 싶었어' 말은 하지 못하고 메마른 한숨을 마신다 머문
        자리마다 추억은 태어나고 노래는 그렇게 우리를 다시 이어 붙여 말하지 못한
        수많은 그 얘기들은 이제 지난 시간 속에 그대로 놔두고 거기서 자라난
        너와의 기억 가만히 가슴에 새겨 누구든 니가 그리울 때 언제라도 여기
        영원처럼 남겨진 너의 빛나던 미소 하나하나 다 모두 꺼내서 보여줄 거야
      </p>
    </section>
    <section>
      <h2 class="text-shadow">권태</h2>
    </section>
    <section>
      <ul>
        <li>1</li>
        <li>2</li>
        <li>3</li>
      </ul>
    </section>
  </body>
</html>
