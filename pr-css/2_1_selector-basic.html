<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /* 전체 선택자  */
      * {
        margin: 0;
        padding: 0;
      }
      /* type 선택자 */
      p {
        background-color: yellow;
      }
      /* class 선택자 */
      .green-text {
        color: green;
      }
      /* id 선택자 */
      #subtitle {
        color: blue;
      }
    </style>
  </head>
  <body>
    <p class="green-text">
      동해물과 백두산이 마르고 닳도록 하느님이 보우하사 우리나라 만세
    </p>
    <p>동해물과 백두산이 마르고 닳도록 하느님이 보우하사 우리나라 만세</p>
    <p id="subtitle">
      동해물과 백두산이 마르고 닳도록 하느님이 보우하사 우리나라 만세
    </p>
  </body>
</html>
