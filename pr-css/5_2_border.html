<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .border {
        width: 200px;
        height: 200px;
        border: 1px solid black;
        border-bottom: 5px dashed blue;
      }
      .border-radius {
        margin: 20px;
        width: 200px;
        height: 200px;
        border: 1px solid black;
        border-radius: 20px;
      }
    </style>
  </head>
  <body>
    <div class="border"></div>
    <div class="border-radius"></div>
  </body>
</html>
